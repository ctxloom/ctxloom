# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: scm

builds:
  # Main scm binary
  - id: scm
    main: ./main.go
    binary: scm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/benjaminabbitt/scm/cmd.Version={{.Version}}

  # simple generator
  - id: scm-gen-simple
    main: ./cmd/generators/simple/main.go
    binary: scm-gen-simple
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    # Include binaries in each archive
    builds:
      - scm
      - scm-gen-simple
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: benjaminabbitt
    name: scm
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## SCM v{{.Version}}

    Sophisticated Context Management - Manage context fragments for AI coding assistants.

    ### Installation

    **Homebrew (macOS/Linux):**
    ```bash
    brew install benjaminabbitt/tap/scm
    ```

    **Go Install:**
    ```bash
    go install github.com/benjaminabbitt/scm@v{{.Version}}
    ```

    **Manual Download:**
    Download the appropriate archive for your platform below.

# Homebrew Tap configuration
brews:
  - name: scm
    ids:
      - default
    repository:
      owner: benjaminabbitt
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/benjaminabbitt/scm"
    description: "Sophisticated Context Management - Manage context fragments for AI coding assistants"
    license: "MIT"
    install: |
      bin.install "scm"
      bin.install "scm-gen-simple"
    test: |
      system "#{bin}/scm", "version"
