name: CI

on:
  push:
    branches: [main, initial-prototyping]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-devcontainer

jobs:
  build-container:
    name: Build Dev Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build-container]
    container:
      image: ghcr.io/${{ github.repository }}-devcontainer:${{ github.sha }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Generate protobuf code
        run: buf generate

      - name: Run tests
        run: just -f justfile.container test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [build-container]
    container:
      image: ghcr.io/${{ github.repository }}-devcontainer:${{ github.sha }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate protobuf code
        run: buf generate

      - name: Run golangci-lint
        run: just -f justfile.container lint

  build-and-integration:
    name: Build & Integration Tests
    runs-on: ubuntu-latest
    needs: [build-container, test]
    container:
      image: ghcr.io/${{ github.repository }}-devcontainer:${{ github.sha }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: just -f justfile.container build

      - name: Add binaries to PATH
        run: |
          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Run integration tests
        run: just -f justfile.container test-integration

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ctxloom-linux-amd64
          path: |
            ctxloom
          retention-days: 7

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: [build-container, test]
    container:
      image: ghcr.io/${{ github.repository }}-devcontainer:${{ github.sha }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Generate protobuf code
        run: buf generate

      - name: Run mutation tests (PR - diff only)
        if: github.event_name == 'pull_request'
        run: gremlins unleash --diff origin/${{ github.base_ref }}

      - name: Run mutation tests (push - full)
        if: github.event_name == 'push'
        run: gremlins unleash
