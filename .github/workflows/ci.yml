name: CI

on:
  push:
    branches: [main, initial-prototyping]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: golang:1.24

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install protoc
        run: |
          apt-get update && apt-get install -y curl unzip
          PROTOC_VERSION=25.1
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip
          unzip protoc-${PROTOC_VERSION}-linux-x86_64.zip -d /usr/local
          rm protoc-${PROTOC_VERSION}-linux-x86_64.zip
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            /go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Generate protobuf code
        run: |
          protoc --go_out=. --go_opt=paths=source_relative \
                 --go-grpc_out=. --go-grpc_opt=paths=source_relative \
                 internal/lm/grpc/plugin.proto

      - name: Run unit tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: golang:1.24

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        run: |
          apt-get update && apt-get install -y curl unzip
          PROTOC_VERSION=25.1
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip
          unzip protoc-${PROTOC_VERSION}-linux-x86_64.zip -d /usr/local
          rm protoc-${PROTOC_VERSION}-linux-x86_64.zip
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate protobuf code
        run: |
          protoc --go_out=. --go_opt=paths=source_relative \
                 --go-grpc_out=. --go-grpc_opt=paths=source_relative \
                 internal/lm/grpc/plugin.proto

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  build-and-acceptance:
    name: Build & Acceptance Tests
    runs-on: ubuntu-latest
    container:
      image: golang:1.24
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git and protoc
        run: |
          apt-get update && apt-get install -y git curl unzip
          PROTOC_VERSION=25.1
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip
          unzip protoc-${PROTOC_VERSION}-linux-x86_64.zip -d /usr/local
          rm protoc-${PROTOC_VERSION}-linux-x86_64.zip
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Mark workspace as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            /go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Generate protobuf code
        run: |
          protoc --go_out=. --go_opt=paths=source_relative \
                 --go-grpc_out=. --go-grpc_opt=paths=source_relative \
                 internal/lm/grpc/plugin.proto

      - name: Validate schemas
        run: go run ./cmd/validate

      - name: Build static binaries
        env:
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X github.com/benjaminabbitt/scm/cmd.Version=ci-${GITHUB_SHA::8}" -o scm .
          mkdir -p bin
          go build -ldflags="-s -w" -o bin/scm-gen-simple ./cmd/generators/simple

      - name: Add binaries to PATH
        run: |
          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Run acceptance tests
        run: go test -v ./tests/acceptance/...

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scm-linux-amd64
          path: |
            scm
            bin/scm-gen-*
          retention-days: 7
