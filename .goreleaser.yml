# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: scm

before:
  hooks:
    - go mod tidy
    - go run ./scripts/genman

builds:
  # Standard build - includes memory and vectors (no CGO required)
  # Recommended for most users
  - id: scm
    main: ./main.go
    binary: scm
    tags:
      - memory
      - vectors
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/SophisticatedContextManager/scm/cmd.Version={{.Version}}

  # Full build - includes memory, vectors, and tree-sitter (31MB)
  # Requires CGO and cross-compilers
  - id: scm-full
    main: ./main.go
    binary: scm
    tags:
      - memory
      - vectors
      - treesitter
    env:
      - CGO_ENABLED=1
      # Cross-compiler environment variables (provided by goreleaser-cross image)
      - >-
        {{- if eq .Os "linux" }}
          {{- if eq .Arch "amd64" }}CC=x86_64-linux-gnu-gcc{{- end }}
          {{- if eq .Arch "arm64" }}CC=aarch64-linux-gnu-gcc{{- end }}
        {{- end }}
        {{- if eq .Os "darwin" }}
          {{- if eq .Arch "amd64" }}CC=o64-clang{{- end }}
          {{- if eq .Arch "arm64" }}CC=oa64-clang{{- end }}
        {{- end }}
        {{- if eq .Os "windows" }}
          {{- if eq .Arch "amd64" }}CC=x86_64-w64-mingw32-gcc{{- end }}
          {{- if eq .Arch "arm64" }}CC=/llvm-mingw/bin/aarch64-w64-mingw32-gcc{{- end }}
        {{- end }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/SophisticatedContextManager/scm/cmd.Version={{.Version}}

# UPX compression for smaller binaries
upx:
  - ids: [scm]
    enabled: true
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    compress: best
    lzma: true
  - ids: [scm-full]
    enabled: true
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    compress: best
    lzma: true

archives:
  # Light build archives (default, recommended)
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    builds:
      - scm
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE*
      - README.md
      - man/man1/*.1

  # Full build archives (with tree-sitter)
  - id: full
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    builds:
      - scm-full
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}_full
    files:
      - LICENSE*
      - README.md
      - man/man1/*.1

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: SophisticatedContextManager
    name: scm
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## SCM v{{.Version}}

    Sophisticated Context Management - Manage context fragments for AI coding assistants.

    ### Which Build?

    | Build | Size | Features |
    |-------|------|----------|
    | **Standard** (`scm_*`) | ~10MB | Memory, vector search (simple embedder) |
    | **Full** (`scm_*_full`) | ~12MB | + Tree-sitter AST code compression |

    Both builds include memory logging and semantic search.
    The full build adds AST-based code compression (requires CGO).

    ### Installation

    **Go Install:**
    ```bash
    go install github.com/SophisticatedContextManager/scm@v{{.Version}}
    ```

    **Manual Download:**
    Download the appropriate archive for your platform below.

    **Man Pages:**
    Man pages are included in the archive. Install with:
    ```bash
    sudo cp man/man1/*.1 /usr/local/share/man/man1/
    ```
