content: |-
    # TDD Fragment (Compressed)

    ## Cycle
    1. **Red**: Write failing test first - must fail correctly, good isolation, verify runs
    2. **Green**: Minimal code to pass - no optimization/extras
    3. **Refactor**: Keep green, apply SOLID, remove duplication, use existing libs, improve names

    ## Integration Tests
    - Run actual binaries (no hooks)
    - Tag slow tests
    - Clean up after

    ## Naming
    `test_<action>_<condition>_<result>`
    - Python: snake_case
    - C#/Java/JS: camelCase
    - Readability > format

    ## Organization
    - Human readable
    - Order by complexity: simple examples top, edge cases bottom
    - Tests = documentation
