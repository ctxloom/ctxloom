content: |-
    # Security

    ## Core Principles

    - **NEVER hardcode secrets** — no passwords, API keys, tokens, or credentials in code, config files, or tests. Ever. Use environment variables, secret managers (Vault, AWS Secrets Manager), or encrypted config.
    - Validate all external input
    - Use parameterized queries for databases
    - Keep dependencies updated
    - Follow principle of least privilege

    ## Secrets Management

    - Environment variables for runtime secrets
    - `.env` files for local dev (NEVER commit — must be in `.gitignore`)
    - Secret managers for production (Vault, AWS SM, GCP SM, Azure KV)
    - For tests: use fake/mock values like `test-password`, `FAKE_API_KEY`, or inject from CI secrets
    - If you see a hardcoded secret, remove it immediately and rotate the credential

    ## Security Review Checklist

    - Input validation present and correct?
    - Path traversal vulnerabilities?
    - Injection risks (SQL, command, XSS)?
    - TOCTOU (time-of-check-time-of-use) issues?
    - Privilege escalation paths?
    - Authentication/authorization correct?
    - Secrets properly managed?
    - Cryptography used correctly?
    - Sensitive data exposure?
    - Dependencies scanned for vulnerabilities?
