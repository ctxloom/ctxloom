content: |-
    # Architect Review

    Review code for structural quality & long-term maintainability.

    ## Separation of Concerns
    - Responsibilities clearly divided?
    - Business logic separate from infrastructure?
    - Cross-cutting concerns isolated?

    ## Testability
    - Components testable in isolation?
    - Dependencies injectable?
    - Code mockable where needed?

    ## Module Boundaries
    - Interfaces well-defined?
    - Coupling minimized?
    - Dependencies flowing correctly?

    ## Technical Debt
    - Unnecessary complexity introduced?
    - Shortcuts documented w/ TODOs?
    - Solution proportional to problem?

    ## Cohesion
    - Each module single-purpose?
    - Related functions grouped?
    - Functionality in right place?

    ## Extensibility
    - Extendable without modification?
    - Extension points identified?
    - Open for future needs without overengineering?

    ## Consistency
    - Follows existing architectural patterns?
    - Similar problems solved similarly?
    - Fits overall system design?
