# ctxloom Configuration
# See https://github.com/ctxloom/ctxloom for documentation

# Language model plugin configuration
llm:
  plugins:
    claude-code: {}

# Default settings
defaults:
  llm_plugin: claude-code
  # Uncomment to set default profiles from ctxloom-default:
  # profiles:
  #   - ctxloom-default/go-developer
  #   - ctxloom-default/python-developer
  #   - ctxloom-default/rust-developer
  #   - ctxloom-default/typescript-web-developer

# Uncomment to configure your preferred editor:
# editor:
#   command: vim
#   args: []

# Available profiles from ctxloom-default:
#   - ctxloom-default/go-developer           (Go backend development)
#   - ctxloom-default/go-code-reviewer       (Go code review)
#   - ctxloom-default/python-developer       (Python development)
#   - ctxloom-default/python-code-reviewer   (Python code review)
#   - ctxloom-default/rust-developer         (Rust systems development)
#   - ctxloom-default/rust-code-reviewer     (Rust code review)
#   - ctxloom-default/typescript-web-developer (TypeScript/React web development)

# Define custom profiles:
# profiles:
