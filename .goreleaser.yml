# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: scm

builds:
  # Main scm binary
  - id: scm
    main: ./main.go
    binary: scm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/benjaminabbitt/scm/cmd.Version={{.Version}}

# UPX compression for smaller binaries
upx:
  - enabled: true
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    compress: best
    lzma: true

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    # Include binaries in each archive
    builds:
      - scm
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: benjaminabbitt
    name: scm
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## SCM v{{.Version}}

    Sophisticated Context Management - Manage context fragments for AI coding assistants.

    ### Installation

    **Go Install:**
    ```bash
    go install github.com/benjaminabbitt/scm@v{{.Version}}
    ```

    **Manual Download:**
    Download the appropriate archive for your platform below.
