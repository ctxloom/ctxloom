    ```yaml
    # problem-solving

    # Workarounds & Problem Solving

    **Core:** Find root cause first. Fix at source.

    ## On Failing Functionality

    1. **Root cause first** - No workarounds without asking. Investigate actual source.

    2. **Ask before complex fixes** - Simple problem + complex solution = stop & ask.

    3. **Prompt with options:**
       - Fix properly (estimate effort)
       - Workaround (document trade-offs)
       - Disable test temporarily (document why)
       - Alternatives

    4. **Cost/benefit analysis:**
       - Pros/cons
       - Tech debt implications
       - Maintainability impact
       - Time required

    5. **Document decision reasoning**

    ## Questions

    - Fix properly or workaround?
    - Pros/cons of each?
    - Tech debt impact?
    - Disable test temporarily?
    - Alternative approaches?
    ```
