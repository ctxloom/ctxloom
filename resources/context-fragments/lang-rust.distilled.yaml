content: |-
    Here is the compressed version:

    # Rust Dev

    ## Tooling
    - Version: Cargo.toml
    - Tests: `#[cfg(test)]`, cucumber-rs (acceptance)
    - Quality: clippy, rustfmt, cargo-audit
    - Logging: tracing

    ## Test Locations
    - Unit: inline `#[cfg(test)]`
    - Integration: `tests/*.rs`
    - Acceptance: `tests/acceptance/features/*.feature`

    ## Patterns

    **Logging**: Use const message IDs in `logmsg.rs`, structured fields

    **Errors**: const strings in `errmsg` module, reference in `#[error]`

    **IoC**: Generic impls w/ trait bounds, type alias for defaults, `::create()` factory

    ## Best Practices

    **Memory**: `Arc<RwLock>` read-heavy, `Arc<Mutex>` write-heavy, accept `&str`

    **Concurrency**: thread-safe, minimal lock hold, consistent order, document

    **Errors**: `Result<T,E>` + `?`, NO `unwrap()`/`expect()` in libs

    **Style**: `cargo fmt`, fix clippy, `///` explains WHY
