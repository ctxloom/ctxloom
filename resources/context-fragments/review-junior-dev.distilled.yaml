content: |-
    Here's a compressed version of that fragment:

    ```markdown
    # review-junior-dev

    Review as newcomer to codebase/profession.

    ## Clarity
    - Understandable on first read?
    - Descriptive names?
    - Logic flow clear?

    ## Documentation
    - Public APIs documented?
    - Complex algorithms explained?
    - Non-obvious decisions commented?

    ## Error Messages
    - Helpful & actionable?
    - Explains what went wrong?
    - Suggests fixes?

    ## Discoverability
    - Intuitive API?
    - Common use cases obvious?
    - Examples in docs/tests?

    ## Consistency
    - Patterns consistent throughout?
    - Naming follows conventions?
    - Uniform style?

    ## Learning Path
    - Code teaches by example?
    - Best practices demonstrated?
    - Complexity introduced gradually?
    ```
