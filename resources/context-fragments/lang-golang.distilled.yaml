content: |-
    # Golang Dev

    ## Env/Tools
    - **Go ver**: go.mod
    - **Test**: stdlib `testing`
    - **Acceptance**: Gherkin (godog)
    - **Lint**: golangci-lint, gofmt/goimports
    - **Log**: zap (structured)

    ## Test Structure
    - Unit: `*_test.go` (co-located)
    - Integration: `tests/integration/*_test.go` or build tags
    - Acceptance: `tests/acceptance/features/*.feature`

    ## Patterns

    **Log msgs**: `logmsg/messages.go` constants → `logger.Info(logmsg.X, zap.String(...))`

    **Error msgs**: `errmsg/messages.go` constants → `errors.New(errmsg.X)`

    **IoC**: Constructor w/ deps + `NewXDefault()` helper (nolint:unused)
