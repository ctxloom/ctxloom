syntax = "proto3";

package scm.lm.generator;

option go_package = "github.com/benjaminabbitt/scm/internal/lm/grpc";

import "internal/lm/grpc/plugin.proto";

// Generator is the gRPC service that context generators must implement.
service Generator {
  // Info returns metadata about the generator.
  rpc Info(scm.lm.plugin.Empty) returns (GeneratorInfo);

  // Generate runs the generator and returns a context fragment.
  rpc Generate(GenerateRequest) returns (GenerateResponse);
}

message GeneratorInfo {
  string name = 1;
  string version = 2;
  string description = 3;
}

message GenerateRequest {
  repeated string args = 1;         // Arguments passed to the generator
  map<string, string> env = 2;      // Environment variables
  string work_dir = 3;              // Working directory
  uint32 verbosity = 4;             // 0=silent, 10=commands, 20=args, 30+=debug
}

message GenerateResponse {
  string content = 1;               // The fragment content (markdown)
  map<string, string> exports = 2;  // Variables to export to other fragments
  int32 exit_code = 3;              // Exit code (0 = success)
  string error = 4;                 // Error message if failed
}
