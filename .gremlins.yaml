# Gremlins mutation testing configuration
# https://gremlins.dev/0.5/usage/configuration/

silent: false

# Files to exclude from mutation testing
exclude-files:
  - ".*_test\\.go$"
  - ".*\\.pb\\.go$"
  - ".*/mock_.*\\.go$"
  - ".*/testdata/.*"
  - "tests/integration/.*"
  - ".*/tests/integration/.*"

unleash:
  # Don't run integration tests (use unit tests only for speed)
  integration: false
  # Set to true to see what would be mutated without running tests
  dry-run: false
  # Build tags to use
  tags: ""
  # Output format (empty = terminal, or "json")
  output: ""
  # Number of workers (0 = number of CPUs)
  workers: 0
  # CPUs per test process (0 = no limit)
  test-cpu: 0
  # Timeout multiplier for test runs (0 = default)
  # Higher values reduce false timeouts but increase run time
  timeout-coefficient: 5

  # Quality gates - fail if scores drop below these thresholds
  threshold:
    # Percentage of mutants killed by tests (0 = disabled)
    # Start conservative, increase as coverage improves
    efficacy: 60
    # Percentage of mutants covered by tests (0 = disabled)
    # Current baseline is ~48%, set threshold slightly below
    mutant-coverage: 45

# Mutation operators to enable
# Start with the most valuable ones, add more as test suite matures
mutants:
  # Replace +, -, *, / with each other
  arithmetic-base:
    enabled: true

  # Change <, <=, >, >= boundary conditions
  conditionals-boundary:
    enabled: true

  # Negate conditionals (== to !=, etc)
  conditionals-negation:
    enabled: true

  # Change ++ to -- and vice versa
  increment-decrement:
    enabled: true

  # Swap assignment operators (+=, -=, etc)
  invert-assignments:
    enabled: true

  # Invert bitwise operators (&, |, ^)
  invert-bitwise:
    enabled: false

  # Invert bitwise assignment operators (&=, |=, ^=)
  invert-bwassign:
    enabled: false

  # Remove negative signs
  invert-negatives:
    enabled: true

  # Invert && to || and vice versa
  invert-logical:
    enabled: true

  # Change break to continue and vice versa
  invert-loopctrl:
    enabled: true

  # Remove self-assignments (x = x)
  remove-self-assignments:
    enabled: true
