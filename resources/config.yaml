ai:
  default_plugin: claude-code
  plugins:
    claude-code:
      binary_path: ""
      args:
        - --dangerously-skip-permissions
      env: {}
    gemini:
      binary_path: ""
      args:
        - --yolo
      env: {}

editor:
  command: vim

defaults:
  persona: developer

generators:
  git-context:
    description: Git repository information
    command: ./bin/mlcm-gen-git-context
  simple:
    description: Wrapper that runs any command and outputs as fragment
    command: ./bin/mlcm-gen-simple

personas:
  developer:
    description: Full development context with all standards and practices
    fragments:
      - communication
      - tdd
      - code-quality
      - dev-environment
      - git
      - documentation
      - problem-solving
      - pushback
      - security

  go-developer:
    description: Go development context
    tags:
      - golang
    fragments:
      - communication
      - tdd
      - code-quality
      - dev-environment
      - git
      - documentation
      - problem-solving
      - pushback
      - security

  python-developer:
    description: Python development context
    tags:
      - python
    fragments:
      - communication
      - tdd
      - code-quality
      - dev-environment
      - git
      - documentation
      - problem-solving
      - pushback
      - security

  rust-developer:
    description: Rust development context
    tags:
      - rust
    fragments:
      - communication
      - tdd
      - code-quality
      - dev-environment
      - git
      - documentation
      - problem-solving
      - pushback
      - security

  reviewer:
    description: Code review with all perspectives
    tags:
      - review
    fragments:
      - communication
      - security

  git-aware:
    description: Context with git repository info
    fragments:
      - git
    generators:
      - git-context
