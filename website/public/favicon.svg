<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <style>
    .lens-bg { fill: #0f172a; }
    .lens-weft-bg { fill: #134e4a; }
    .lens-warp-bg { fill: #312e81; }
    .glass-stroke { stroke: #64748b; }

    @media (prefers-color-scheme: light) {
      .lens-bg { fill: #f1f5f9; }
      .lens-weft-bg { fill: #99f6e4; }
      .lens-warp-bg { fill: #c7d2fe; }
      .glass-stroke { stroke: #94a3b8; }
    }
  </style>
  <defs>
    <linearGradient id="warp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="weft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0.03"/>
    </linearGradient>
    <clipPath id="lens">
      <circle cx="52" cy="52" r="44"/>
    </clipPath>
  </defs>

  <!-- Magnified content inside lens -->
  <g clip-path="url(#lens)">
    <rect class="lens-bg" x="4" y="4" width="96" height="96" fill-opacity="0.7"/>

    <!-- Layer 1: Even weft (under) -->
    <g>
      <g class="lens-weft-bg" opacity="0.7">
        <rect x="0" y="39" width="120" height="11"/>
        <rect x="0" y="72" width="120" height="11"/>
      </g>
      <g fill="url(#weft)" font-family="monospace" font-size="11" font-weight="600">
        <text x="4" y="48">Context·Loom</text>
        <text x="4" y="81">distill·sync</text>
      </g>
    </g>

    <!-- Layer 2: Odd warp (over even weft) -->
    <g>
      <g class="lens-warp-bg" opacity="0.7">
        <rect x="17" y="0" width="11" height="120"/>
        <rect x="50" y="0" width="11" height="120"/>
        <rect x="83" y="0" width="11" height="120"/>
      </g>
      <g fill="url(#warp)" font-family="monospace" font-size="11" font-weight="600">
        <text x="21" y="-2" transform="rotate(90 21 -2)">ctxloom·weave</text>
        <text x="54" y="-2" transform="rotate(90 54 -2)">fragments·mcp</text>
        <text x="87" y="-2" transform="rotate(90 87 -2)">session·mem</text>
      </g>
    </g>

    <!-- Layer 3: Odd weft (over odd warp) -->
    <g>
      <g class="lens-weft-bg" opacity="0.7">
        <rect x="0" y="22" width="120" height="11"/>
        <rect x="0" y="55" width="120" height="11"/>
        <rect x="0" y="88" width="120" height="11"/>
      </g>
      <g fill="url(#weft)" font-family="monospace" font-size="11" font-weight="600">
        <text x="4" y="31">weave·context</text>
        <text x="4" y="64">run·-p·dev</text>
        <text x="4" y="97">MCP·hooks</text>
      </g>
    </g>

    <!-- Layer 4: Even warp (over odd weft) -->
    <g>
      <g class="lens-warp-bg" opacity="0.7">
        <rect x="33" y="0" width="11" height="120"/>
        <rect x="66" y="0" width="11" height="120"/>
      </g>
      <g fill="url(#warp)" font-family="monospace" font-size="11" font-weight="600">
        <text x="37" y="-2" transform="rotate(90 37 -2)">fault·tolerant</text>
        <text x="70" y="-2" transform="rotate(90 70 -2)">bundles·prof</text>
      </g>
    </g>
  </g>

  <!-- Magnifying glass frame -->
  <g fill="none" class="glass-stroke" stroke-width="5">
    <circle cx="52" cy="52" r="47" fill="url(#glass)" stroke-width="6"/>
    <line x1="88" y1="88" x2="118" y2="118" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
