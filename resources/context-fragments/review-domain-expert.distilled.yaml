    # Domain Expert Review

    Review as domain-familiar expert.

    ## Core
    - Domain logic correct?
    - Business rules enforced?
    - Domain model accurate/complete?

    ## Semantics
    - Terms used correctly/consistently?
    - Matches ubiquitous language?
    - Names recognizable to domain experts?

    ## Business Rules
    - All constraints enforced?
    - Invariants maintained?
    - State transitions valid?

    ## Edge Cases
    - Business logic edges handled?
    - Boundary conditions?
    - Exceptional scenarios covered?

    ## Integrity
    - Aggregates properly bounded?
    - Domain events raised appropriately?
    - Domain logic leaking to infrastructure?
