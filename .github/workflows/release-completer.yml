name: Release Completer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.0.4)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    container:
      # goreleaser-cross includes cross-compilation toolchains for CGO
      image: ghcr.io/goreleaser/goreleaser-cross:v1.24

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git curl upx unzip

      - name: Mark workspace as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install build tools
        run: |
          # Install just
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin
          # Install versionator
          curl -sSL https://github.com/benjaminabbitt/versionator/releases/download/v0.0.7/versionator-linux-amd64 -o /usr/local/bin/versionator
          chmod +x /usr/local/bin/versionator
          # Install buf
          curl -sSL https://github.com/bufbuild/buf/releases/latest/download/buf-Linux-x86_64 -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf

      - name: Generate protobuf code
        run: buf generate

      - name: Validate schemas
        run: go run ./cmd/validate

      - name: Compute install script hashes
        id: script_hashes
        run: |
          HASH_SH=$(sha256sum scripts/install.sh | cut -d' ' -f1)
          HASH_PS1=$(sha256sum scripts/install.ps1 | cut -d' ' -f1)

          echo "install.sh SHA256: $HASH_SH"
          echo "install.ps1 SHA256: $HASH_PS1"

          # Export for goreleaser
          echo "HASH_INSTALL_SH=$HASH_SH" >> $GITHUB_ENV
          echo "HASH_INSTALL_PS1=$HASH_PS1" >> $GITHUB_ENV

      - name: Run GoReleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HASH_INSTALL_SH: ${{ env.HASH_INSTALL_SH }}
          HASH_INSTALL_PS1: ${{ env.HASH_INSTALL_PS1 }}

      - name: Upload install scripts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts/install.sh
            scripts/install.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
