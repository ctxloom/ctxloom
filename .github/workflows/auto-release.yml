name: Auto Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [initial-prototyping]

permissions:
  contents: write

jobs:
  auto-release:
    name: Bump Version and Release
    runs-on: ubuntu-latest
    # Only run if CI passed and it was a push (not PR)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install versionator
        run: |
          curl -sSL https://github.com/benjaminabbitt/versionator/releases/download/v0.0.7/versionator-linux-amd64 -o /usr/local/bin/versionator
          chmod +x /usr/local/bin/versionator

      - name: Get current version
        id: current
        run: |
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Bump patch version
        run: |
          versionator patch increment
          echo "New version: $(cat VERSION)"

      - name: Get new version
        id: new
        run: |
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add VERSION
          git commit -m "Bump version to ${{ steps.new.outputs.version }}"

      - name: Create and push tag
        run: |
          git tag "${{ steps.new.outputs.version }}"
          git push origin HEAD:initial-prototyping
          git push origin "${{ steps.new.outputs.version }}"

      - name: Summary
        run: |
          echo "## Auto Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Previous version:** ${{ steps.current.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New version:** ${{ steps.new.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The release workflow has been triggered and will create the GitHub release." >> $GITHUB_STEP_SUMMARY
